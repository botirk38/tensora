# GitLab CI/CD Configuration for tensor_store
# High-performance tensor I/O library with io_uring optimization

default:
  tags:
    - linux
    - shell
    - io-uring

variables:
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo
  CARGO_INCREMENTAL: "1"
  CARGO_NET_RETRY: "3"
  RUST_BACKTRACE: "1"
  RUSTFLAGS: ""

stages:
  - lint
  - build
  - test
  - coverage
  - bench-check
  - docs

# =============================================================================
# Stage: lint
# =============================================================================

format-check:
  stage: lint
  script:
    - cd tensor_store
    - cargo fmt --check
  allow_failure: false

clippy:
  stage: lint
  script:
    - cd tensor_store
    - cargo clippy --all-targets --workspace
  cache:
    key:
      files:
        - tensor_store/Cargo.lock
      prefix: clippy
    paths:
      - tensor_store/target/
      - $CARGO_HOME/registry/index/
      - $CARGO_HOME/registry/cache/
      - $CARGO_HOME/git/db/
  allow_failure: false

# =============================================================================
# Stage: build
# =============================================================================

build-release:
  stage: build
  script:
    - cd tensor_store
    - cargo build --release --workspace --locked
  cache:
    key:
      files:
        - tensor_store/Cargo.lock
      prefix: build-release
    paths:
      - tensor_store/target/
      - $CARGO_HOME/registry/index/
      - $CARGO_HOME/registry/cache/
      - $CARGO_HOME/git/db/
  artifacts:
    paths:
      - tensor_store/target/release/safetensors_reader
      - tensor_store/target/release/serverlessllm_reader
      - tensor_store/target/release/profile
      - tensor_store/target/release/demo
    expire_in: 1 week

# =============================================================================
# Stage: test
# =============================================================================

test-unit:
  stage: test
  script:
    - cd tensor_store
    - cargo test --workspace --lib --bins --locked -- --show-output
  cache:
    key:
      files:
        - tensor_store/Cargo.lock
      prefix: test
    paths:
      - tensor_store/target/
      - $CARGO_HOME/registry/index/
      - $CARGO_HOME/registry/cache/
      - $CARGO_HOME/git/db/

test-doc:
  stage: test
  script:
    - cd tensor_store
    - cargo test --doc --locked
  cache:
    key:
      files:
        - tensor_store/Cargo.lock
      prefix: test-doc
    paths:
      - tensor_store/target/
      - $CARGO_HOME/registry/index/
      - $CARGO_HOME/registry/cache/
      - $CARGO_HOME/git/db/

# =============================================================================
# Stage: coverage
# =============================================================================

coverage-llvm:
  stage: coverage
  before_script:
    - rustup component add llvm-tools-preview || true
    - cargo install cargo-llvm-cov || echo "cargo-llvm-cov already installed"
  script:
    - cd tensor_store
    - cargo llvm-cov clean --workspace
    - cargo llvm-cov --workspace --all-targets --lcov --output-path coverage.lcov
    - cargo llvm-cov report --summary-only
    - cargo llvm-cov report --html
    - |
      COVERAGE=$(cargo llvm-cov report --summary-only | grep -E '^\s*TOTAL' | awk '{print $10}' | sed 's/%//' || echo "0")
      echo "Total coverage: ${COVERAGE}%"
  coverage: '/Total coverage: (\d+\.\d+)%/'
  cache:
    key:
      files:
        - tensor_store/Cargo.lock
      prefix: coverage
    paths:
      - tensor_store/target/
      - $CARGO_HOME/registry/index/
      - $CARGO_HOME/registry/cache/
      - $CARGO_HOME/git/db/
      - $CARGO_HOME/bin/
  artifacts:
    paths:
      - tensor_store/coverage.lcov
      - tensor_store/target/llvm-cov/html/
    expire_in: 1 month

# =============================================================================
# Stage: bench-check
# =============================================================================

bench-compile:
  stage: bench-check
  script:
    - cd tensor_store
    - cargo bench --no-run --workspace --locked
  cache:
    key:
      files:
        - tensor_store/Cargo.lock
      prefix: bench
    paths:
      - tensor_store/target/
      - $CARGO_HOME/registry/index/
      - $CARGO_HOME/registry/cache/
      - $CARGO_HOME/git/db/
  when: manual
  allow_failure: true

# =============================================================================
# Stage: docs
# =============================================================================

docs-build:
  stage: docs
  script:
    - cd tensor_store
    - cargo doc --no-deps --workspace --document-private-items
  cache:
    key:
      files:
        - tensor_store/Cargo.lock
      prefix: docs
    paths:
      - tensor_store/target/
      - $CARGO_HOME/registry/index/
      - $CARGO_HOME/registry/cache/
      - $CARGO_HOME/git/db/
  artifacts:
    paths:
      - tensor_store/target/doc/
    expire_in: 1 week
