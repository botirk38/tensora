# Minimal CI configuration - use extended template with custom runner tags
include:
  - component: gitlab.com/rust-ci/rust-ci/extended@1.4.0

# Custom runner tags for io-uring support
default:
  tags:
    - linux
    - shell
    - io-uring

# Preserve cargo home location
variables:
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo
