[target.'cfg(all())']
rustflags = [
    # Deny all warnings
    "-Dwarnings",

    # Clippy lint groups - deny by default
    "-Dclippy::all",
    "-Dclippy::nursery",
    "-Dclippy::cargo",

    # Specific restriction lints we want to enforce
    "-Dclippy::dbg_macro",
    "-Dclippy::todo",
    "-Dclippy::unimplemented",
    "-Dclippy::panic",
    "-Dclippy::exit",
    "-Dclippy::as_conversions",
    "-Dclippy::try_err",
    "-Dclippy::wildcard_enum_match_arm",
    "-Dclippy::string_slice",
    "-Dclippy::shadow_reuse",
    "-Dclippy::shadow_same",
    "-Dclippy::shadow_unrelated",
    "-Dclippy::clone_on_ref_ptr",
    "-Dclippy::mem_forget",
    "-Dclippy::rc_buffer",
    "-Dclippy::rc_mutex",
    "-Dclippy::create_dir",
    "-Dclippy::filetype_is_file",
    "-Dclippy::if_then_some_else_none",
    "-Dclippy::lossy_float_literal",
    "-Dclippy::mod_module_files",
    "-Dclippy::multiple_inherent_impl",
    "-Dclippy::rest_pat_in_fully_bound_structs",
    "-Dclippy::same_name_method",
    "-Dclippy::string_add",
    "-Dclippy::string_to_string",
    "-Dclippy::unnecessary_self_imports",
    "-Dclippy::unneeded_field_pattern",
    "-Dclippy::verbose_file_reads",

    # Allow some pedantic lints that are too noisy or not applicable
    "-Aclippy::module_name_repetitions",
    "-Aclippy::missing_errors_doc",
    "-Aclippy::missing_panics_doc",
    "-Aclippy::mod_module_files",
    "-Aclippy::multiple_crate_versions",
    "-Aclippy::future_not_send",
    "-Aclippy::get_first",
    "-Aclippy::expect_used",
    "-Aclippy::unwrap_used",
    "-Aclippy::print_stdout",
    "-Aclippy::arithmetic_side_effects",
    "-Aclippy::mem_forget",
]
